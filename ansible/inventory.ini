[production]
# Replace 192.168.56.10 with the actual IP of your production VM
# If using Vagrant, this is typically the private_network IP from Vagrantfile
prod-vm ansible_host=192.168.56.10 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/prod_vm_key

[production:vars]
ansible_python_interpreter=/usr/bin/python3
app_port=8080
app_user=petclinic
app_dir=/opt/petclinic
